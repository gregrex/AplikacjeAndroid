name: Build Signed Google Play AAB

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-aab:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Restore MAUI workloads
        shell: pwsh
        run: dotnet workload restore src/AppFactory.Mobile/AppFactory.Mobile.csproj

      - name: Prepare signing files
        shell: pwsh
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:KEYSTORE_BASE64)) { throw 'ANDROID_KEYSTORE_BASE64 is missing.' }
          if ([string]::IsNullOrWhiteSpace($env:STORE_PASSWORD)) { throw 'ANDROID_KEYSTORE_PASSWORD is missing.' }
          if ([string]::IsNullOrWhiteSpace($env:KEY_PASSWORD)) { throw 'ANDROID_KEY_PASSWORD is missing.' }
          $secretRoot = Join-Path $env:RUNNER_TEMP 'appfactory-signing'
          New-Item -ItemType Directory -Force -Path $secretRoot | Out-Null
          [IO.File]::WriteAllBytes((Join-Path $secretRoot 'upload.keystore'), [Convert]::FromBase64String($env:KEYSTORE_BASE64))
          Set-Content (Join-Path $secretRoot 'store-password.txt') $env:STORE_PASSWORD -NoNewline
          Set-Content (Join-Path $secretRoot 'key-password.txt') $env:KEY_PASSWORD -NoNewline

      - name: Test and build signed AAB
        shell: pwsh
        env:
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          $secretRoot = Join-Path $env:RUNNER_TEMP 'appfactory-signing'
          $alias = if ([string]::IsNullOrWhiteSpace($env:ANDROID_KEY_ALIAS)) { 'appfactory-upload' } else { $env:ANDROID_KEY_ALIAS }
          pwsh ./tools/release/build-play-aab.ps1 `
            -KeystorePath (Join-Path $secretRoot 'upload.keystore') `
            -KeyAlias $alias `
            -KeyPasswordFile (Join-Path $secretRoot 'key-password.txt') `
            -StorePasswordFile (Join-Path $secretRoot 'store-password.txt')

      - name: Upload signed AAB
        uses: actions/upload-artifact@v7
        with:
          name: appfactory-google-play-aab
          path: |
            artifacts/google-play/release/*.aab
            artifacts/google-play/release/*.sha256
            artifacts/google-play/release/release-manifest.json
          if-no-files-found: error
          retention-days: 14

      - name: Remove signing files
        if: always()
        shell: pwsh
        run: Remove-Item (Join-Path $env:RUNNER_TEMP 'appfactory-signing') -Recurse -Force -ErrorAction SilentlyContinue
